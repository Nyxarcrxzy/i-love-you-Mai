<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Galaxia para Mai</title>
  <style>
    html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial}
    #galaxy-canvas{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
    .pill{position:fixed;top:10px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;font:13px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial;text-shadow:0 0 15px rgba(255,200,240,.8);z-index:100}
    .attribution{position:fixed;left:10px;bottom:10px;font-size:12px;color:#b9a0ff;opacity:.9;background:rgba(0,0,0,.35);padding:8px 12px;border-radius:8px;text-shadow:0 0 10px rgba(185,160,255,.6)}
    #fx{position:fixed;inset:0;pointer-events:none;width:100%;height:100%}
  </style>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>

<body>

<canvas id="galaxy-canvas"></canvas>
<div class="pill">I love you eres mi mundo Mai 💕</div>
<div class="attribution">nyxar 🌌</div>
<canvas id="fx"></canvas>

<!-- 🎵 MÚSICA AUTOMÁTICA -->
<audio id="bgAudio" autoplay loop style="display:none;">
  <source src="https://raw.githubusercontent.com/Nyxarcrxzy/i-love-you-Mai/main/creepin.mp3" type="audio/mpeg">
</audio>

<script>
(function(){

try { 
  const test = document.createElement('canvas').getContext('webgl') || document.createElement('canvas').getContext('experimental-webgl');
  if(!test) throw new Error('WebGL no disponible');
} catch(e) { console.error(e); return; }

const canvas = document.getElementById('galaxy-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio||1));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 3000);
const controls = new THREE.OrbitControls(camera, renderer.domElement);

controls.enableDamping = true;
controls.dampingFactor = 0.04;
controls.minDistance = 50;
controls.maxDistance = 400;
camera.position.set(0, 40, 120);

// ====== FONDO NEBULOSA MORADA NEÓN ======
function makeNebulaBackground() {
  const canvas = document.createElement('canvas');
  canvas.width = 2048;
  canvas.height = 2048;
  const ctx = canvas.getContext('2d');
  
  const gradient = ctx.createRadialGradient(1024, 1024, 300, 1024, 1024, 2800);
  gradient.addColorStop(0, '#3d1f5f');
  gradient.addColorStop(0.2, '#2d1850');
  gradient.addColorStop(0.4, '#1f0f3f');
  gradient.addColorStop(0.7, '#140a28');
  gradient.addColorStop(1, '#080012');
  
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  for (let layer = 0; layer < 4; layer++) {
    for (let i = 0; i < 60; i++) {
      const x = Math.random() * 1200 + 100;
      const y = Math.random() * canvas.height;
      const size = Math.random() * 400 + 250;
      
      const nebGlow = ctx.createRadialGradient(x, y, 0, x, y, size);
      nebGlow.addColorStop(0, `rgba(255, 50, 200, ${0.25 - layer * 0.05})`);
      nebGlow.addColorStop(0.2, `rgba(200, 100, 255, ${0.2 - layer * 0.04})`);
      nebGlow.addColorStop(0.5, `rgba(150, 50, 200, ${0.12 - layer * 0.02})`);
      nebGlow.addColorStop(1, 'rgba(100, 20, 150, 0)');
      
      ctx.fillStyle = nebGlow;
      ctx.fillRect(x - size, y - size, size * 2, size * 2);
    }
  }
  
  for (let i = 0; i < 1500; i++) {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height;
    const size = Math.random() * 1.5 + 0.3;
    const brightness = Math.random() * 0.8 + 0.3;
    
    ctx.fillStyle = `rgba(255, 255, 255, ${brightness})`;
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  }
  
  for (let i = 0; i < 80; i++) {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height;
    
    const haloGradient = ctx.createRadialGradient(x, y, 0, x, y, 15);
    haloGradient.addColorStop(0, 'rgba(255, 150, 200, 0.6)');
    haloGradient.addColorStop(0.5, 'rgba(255, 200, 220, 0.2)');
    haloGradient.addColorStop(1, 'rgba(255, 100, 180, 0)');
    
    ctx.fillStyle = haloGradient;
    ctx.fillRect(x - 15, y - 15, 30, 30);
    
    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  
  for (let i = 0; i < 600; i++) {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height;
    const size = Math.random() * 2 + 0.5;
    
    ctx.fillStyle = `rgba(220, 100, 255, ${Math.random() * 0.7 + 0.2})`;
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  }
  
  return new THREE.CanvasTexture(canvas);
}

const bgTexture = makeNebulaBackground();
bgTexture.wrapS = bgTexture.wrapT = THREE.RepeatWrapping;
const bgGeo = new THREE.SphereGeometry(1500, 64, 64);
const bg = new THREE.Mesh(bgGeo, new THREE.MeshBasicMaterial({ 
  map: bgTexture, 
  side: THREE.BackSide
}));
scene.add(bg);

// ====== PLANETA NEGRO EN EL CENTRO ======
const planetCore = new THREE.Mesh(
  new THREE.SphereGeometry(12, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0x000000 })
);
scene.add(planetCore);

// ====== EFECTO GAS/NEBULOSA ALREDEDOR DEL PLANETA ======
const gasCloud = new THREE.Mesh(
  new THREE.SphereGeometry(45, 32, 32),
  new THREE.MeshBasicMaterial({
    color: 0xff66ff,
    transparent: true,
    opacity: 0.15,
    blending: THREE.AdditiveBlending
  })
);
scene.add(gasCloud);

const gasCloud2 = new THREE.Mesh(
  new THREE.SphereGeometry(60, 32, 32),
  new THREE.MeshBasicMaterial({
    color: 0xdd99ff,
    transparent: true,
    opacity: 0.08,
    blending: THREE.AdditiveBlending
  })
);
scene.add(gasCloud2);

// ====== LETRAS NEON BLANCO CON BORDE ROSA BRILLANTE ======
const galaxy = new THREE.Group();
scene.add(galaxy);

const phrases = ["Pinchecha ✨", "Hermosa ❤️", "Mi Bebe", "Mi Cielito 🌌", "Hermosota ✨", "Mi Infinita ♾️", "Mi Todo", "Me Encantas 🥰", "Perla 💫", "Te Amo ❤️", "Mi Canción Favorita 🎶", "Única 😊", "Mi Reina 👑", "Mi Amor", "Mi Mundo", "Mi Luz 🌠", "Mi Niña", "Mi Tesoro ❤️", "Mi Paz", "Mi Eterna", "Mi Sueño", "Mi Pensamiento Favorito", "Mi Bombom", "Mi Diosa", "Te Amo Infinitamente ♾️", "Mi Tetona", "Mi Qlona", "Mi Enojona", "Mi Universo", "Mi Vida", "Mi Preciosa", "Mi Lugar Seguro", "Perfecta", "Me Vuelves Loco", "Me Enamoras", "Te Amo", "Me Gustas"];

const numRings = 4;
const ringRadii = [85, 95, 105, 115];

function makeTextTexture(text, size) {
  const canvas = document.createElement('canvas');
  canvas.width = 1024;
  canvas.height = 256;
  const ctx = canvas.getContext('2d');
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  ctx.font = 'bold ' + size + 'px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  // CONTORNO ROSA BRILLANTE (3 capas)
  ctx.strokeStyle = '#FF1493';
  ctx.lineWidth = 8;
  ctx.shadowColor = 'rgba(255, 20, 147, 0.8)';
  ctx.shadowBlur = 40;
  ctx.strokeText(text, 512, 128);
  
  ctx.strokeStyle = '#FF69B4';
  ctx.lineWidth = 6;
  ctx.shadowColor = 'rgba(255, 105, 180, 0.6)';
  ctx.shadowBlur = 30;
  ctx.strokeText(text, 512, 128);
  
  ctx.strokeStyle = '#FFB6D9';
  ctx.lineWidth = 4;
  ctx.shadowColor = 'rgba(255, 182, 217, 0.5)';
  ctx.shadowBlur = 20;
  ctx.strokeText(text, 512, 128);
  
  // RELLENO BLANCO
  ctx.fillStyle = '#FFFFFF';
  ctx.shadowColor = 'rgba(255, 255, 255, 0)';
  ctx.shadowBlur = 0;
  ctx.fillText(text, 512, 128);
  
  return new THREE.CanvasTexture(canvas);
}

const phrasePerRing = Math.ceil(phrases.length / numRings);

for (let ring = 0; ring < numRings; ring++) {
  const radius = ringRadii[ring];
  const phrasesInRing = phrases.slice(ring * phrasePerRing, (ring + 1) * phrasePerRing);
  const numPhrases = phrasesInRing.length;
  
  for (let i = 0; i < numPhrases; i++) {
    const text = phrasesInRing[i];
    const tex = makeTextTexture(text, 56);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, sizeAttenuation: true }));
    
    const angle = (i / numPhrases) * Math.PI * 2;
    const x = Math.cos(angle) * radius;
    const z = Math.sin(angle) * radius;
    const y = (Math.random() - 0.5) * 15;
    
    sprite.position.set(x, y, z);
    sprite.scale.set(24, 5, 1);
    galaxy.add(sprite);
  }
}

// PARTÍCULAS FLOTANTES EN LOS ANILLOS
const particleCount = 5000;
const particleGeom = new THREE.BufferGeometry();
const particlePos = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = Math.random() * 120 + 60;
  const y = (Math.random() - 0.5) * 80;
  
  particlePos[i*3] = Math.cos(angle) * dist;
  particlePos[i*3+1] = y;
  particlePos[i*3+2] = Math.sin(angle) * dist;
}

particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
galaxy.add(new THREE.Points(particleGeom, new THREE.PointsMaterial({ 
  color: 0xff99ff, 
  size: 0.6, 
  transparent: true, 
  opacity: 0.85,
  sizeAttenuation: true
})));

// ====== ANILLO SATURNO HORIZONTAL (ACOSTADO) ======
const saturnRing = new THREE.Mesh(
  new THREE.RingGeometry(80, 110, 256),
  new THREE.MeshBasicMaterial({ 
    color: 0xffffff,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending
  })
);
saturnRing.rotation.x = Math.PI / 2;
saturnRing.rotation.y = 0;
saturnRing.rotation.z = 0;
scene.add(saturnRing);

const glowRing = new THREE.Mesh(
  new THREE.RingGeometry(70, 120, 256),
  new THREE.MeshBasicMaterial({ 
    color: 0xdd00ff,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.5,
    blending: THREE.AdditiveBlending
  })
);
glowRing.rotation.x = Math.PI / 2;
glowRing.rotation.y = 0;
glowRing.rotation.z = 0;
scene.add(glowRing);

function animate() {
  requestAnimationFrame(animate);
  const t = performance.now() * 0.00008;
  
  bg.rotation.y = t * 0.2;
  galaxy.rotation.y = t * 0.8;
  gasCloud.rotation.y = t * 0.3;
  gasCloud2.rotation.y = -t * 0.2;
  planetCore.rotation.y = t * 1.2;
  
  controls.update();
  renderer.render(scene, camera);
}

animate();

// ====== CORAZONES ======
const fx = document.getElementById('fx');
const ctx2 = fx.getContext('2d');
const hearts = [];

function resizeFx() {
  fx.width = window.innerWidth;
  fx.height = window.innerHeight;
}

addEventListener('resize', resizeFx);
resizeFx();

function spawnHearts(x, y, n = 20) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    hearts.push({
      x, y,
      vx: Math.cos(a) * (0.6 + Math.random() * 0.8),
      vy: -(0.8 + Math.random() * 1.2),
      life: 1,
      size: 10 + Math.random() * 16
    });
  }
}

function drawHeart(x, y, size) {
  const s = size;
  ctx2.save();
  ctx2.translate(x, y);
  ctx2.beginPath();
  ctx2.moveTo(0, -0.25 * s);
  ctx2.bezierCurveTo(0.5 * s, -0.9 * s, 1.4 * s, -0.1 * s, 0, 0.9 * s);
  ctx2.bezierCurveTo(-1.4 * s, -0.1 * s, -0.5 * s, -0.9 * s, 0, -0.25 * s);
  const g = ctx2.createRadialGradient(0, 0, 0, 0, 0, s);
  g.addColorStop(0, 'rgba(255,190,220,.95)');
  g.addColorStop(1, 'rgba(255,90,160,0)');
  ctx2.fillStyle = g;
  ctx2.fill();
  ctx2.restore();
}

let lastTap = 0;
addEventListener('click', (e) => {
  const now = performance.now();
  if (now - lastTap < 320) spawnHearts(e.clientX, e.clientY, 20);
  lastTap = now;
}, { passive: true });

function loopFx() {
  ctx2.clearRect(0, 0, fx.width, fx.height);
  for (let i = hearts.length - 1; i >= 0; i--) {
    const h = hearts[i];
    h.x += h.vx;
    h.y += h.vy;
    h.vy -= 0.02;
    h.life -= 0.015;
    ctx2.globalAlpha = Math.max(0, h.life);
    drawHeart(h.x, h.y, h.size);
    ctx2.globalAlpha = 1;
    if (h.life <= 0) hearts.splice(i, 1);
  }
  requestAnimationFrame(loopFx);
}

loopFx();

// ====== MÚSICA AUTOMÁTICA ======
const audio = document.getElementById('bgAudio');
audio.volume = 0.5;
audio.play().catch(() => {
  document.addEventListener('click', () => {
    audio.play();
  }, { once: true });
});

})();
</script>

</body>
</html>
